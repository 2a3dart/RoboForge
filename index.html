<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROBO FORGE — 3D Robot Customizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #0e0e0e;
    --panel: #141414;
    --panel2: #1a1a1a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --accent3: #a855f7;
    --text: #e0e0e0;
    --text-dim: #555;
    --border: #242424;
    --glow: none;
    --glow2: none;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 52px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .logo {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 5px;
    color: var(--text);
    text-transform: uppercase;
  }

  .logo span { color: var(--accent); }

  .header-info {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: var(--text-dim);
    letter-spacing: 0.3px;
  }

  .header-actions { display: flex; gap: 8px; }

  /* MAIN LAYOUT */
  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* LEFT PANEL */
  .left-panel {
    width: 256px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .panel-title {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--text-dim);
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }

  .part-categories {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .cat-btn {
    flex: 1;
    padding: 9px 4px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    text-transform: uppercase;
  }

  .cat-btn:hover { color: var(--text); background: rgba(255,255,255,0.02); }
  .cat-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: rgba(232,255,71,0.04);
  }

  .parts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    padding: 10px;
    overflow-y: auto;
    flex: 1;
  }

  .parts-grid::-webkit-scrollbar { width: 3px; }
  .parts-grid::-webkit-scrollbar-track { background: var(--panel); }
  .parts-grid::-webkit-scrollbar-thumb { background: var(--border); }

  .part-card {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .part-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.15s;
  }

  .part-card:hover { border-color: #333; transform: translateY(-1px); }
  .part-card:hover::before { transform: scaleX(1); }
  .part-card.selected {
    border-color: var(--accent);
    background: rgba(232,255,71,0.05);
  }
  .part-card.selected::before { transform: scaleX(1); }

  .part-preview {
    width: 100%;
    aspect-ratio: 1;
    background: #111;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 6px;
    font-size: 28px;
    position: relative;
    overflow: hidden;
  }

  .part-preview canvas {
    width: 100% !important;
    height: 100% !important;
  }

  .part-name {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: center;
  }

  .part-card.selected .part-name { color: var(--accent); }

  .selected-badge {
    position: absolute;
    top: 5px; right: 5px;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    display: none;
  }
  .part-card.selected .selected-badge { display: block; }

  /* CENTER - 3D VIEWPORT */
  .viewport {
    flex: 1;
    position: relative;
    background: #727272;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #robot-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .viewport-overlay {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 5;
  }

  .view-hint {
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(0,0,0,0.12);
    padding: 5px 10px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    color: #444;
    border-radius: 2px;
  }

  .scan-lines {
    display: none;
  }

  .corner-deco {
    position: absolute;
    width: 20px;
    height: 20px;
    z-index: 5;
    pointer-events: none;
  }
  .corner-deco.tl { top: 16px; left: 16px; border-top: 1px solid rgba(0,0,0,0.2); border-left: 1px solid rgba(0,0,0,0.2); }
  .corner-deco.tr { top: 16px; right: 16px; border-top: 1px solid rgba(0,0,0,0.2); border-right: 1px solid rgba(0,0,0,0.2); }
  .corner-deco.bl { bottom: 16px; left: 16px; border-bottom: 1px solid rgba(0,0,0,0.2); border-left: 1px solid rgba(0,0,0,0.2); }
  .corner-deco.br { bottom: 16px; right: 16px; border-bottom: 1px solid rgba(0,0,0,0.2); border-right: 1px solid rgba(0,0,0,0.2); }

  .robot-name-display {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 5;
    pointer-events: none;
  }

  .robot-name-display h2 {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 5px;
    color: #2a2a2a;
  }

  .robot-name-display p {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: #555555;
    letter-spacing: 2px;
    margin-top: 3px;
  }

  /* RIGHT PANEL */
  .right-panel {
    width: 256px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .color-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .color-zones {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .color-zone {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .zone-label {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: var(--text-dim);
    width: 72px;
  }

  .color-picker-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
  }

  .color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 3px;
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .color-swatch:hover { border-color: var(--accent); }

  .color-swatch input[type="color"] {
    position: absolute;
    inset: -4px;
    width: calc(100% + 8px);
    height: calc(100% + 8px);
    border: none;
    cursor: pointer;
    opacity: 0;
  }

  .color-presets {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .preset-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
  }

  .preset-dot:hover { transform: scale(1.3); border-color: white; }

  /* MATERIAL SECTION */
  .material-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .material-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 8px;
  }

  .mat-btn {
    padding: 7px 6px;
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3px;
    cursor: pointer;
    border-radius: 2px;
    text-transform: uppercase;
    transition: all 0.15s;
    text-align: center;
  }

  .mat-btn:hover { border-color: #333; color: var(--text); }
  .mat-btn.active {
    background: rgba(232,255,71,0.06);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* STATS */
  .stats-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    flex: 1;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }

  .stat-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 400;
    color: var(--text-dim);
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .stat-value {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
  }

  /* ROBOT NAME */
  .name-section {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .name-input {
    width: 100%;
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 3px;
    padding: 8px 10px;
    border-radius: 2px;
    outline: none;
    text-transform: uppercase;
    transition: border-color 0.15s;
  }

  .name-input:focus { border-color: #333; }

  /* EXPORT BUTTONS */
  .export-section {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .btn {
    padding: 10px 16px;
    border: none;
    border-radius: 2px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity 0.15s;
  }

  .btn:hover { opacity: 0.82; }

  .btn-primary {
    background: var(--accent);
    color: #0e0e0e;
    font-weight: 500;
  }

  .btn-secondary {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { color: var(--text); border-color: #333; opacity: 1; }

  .btn-accent2 {
    background: var(--panel2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    border-radius: 2px;
    opacity: 0;
    transition: all 0.25s;
    z-index: 1000;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* LOADING */
  .loading-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: opacity 0.5s;
  }

  .loading-screen.hidden { opacity: 0; pointer-events: none; }

  .loading-logo {
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 8px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .loading-bar-wrap {
    width: 200px;
    height: 2px;
    background: var(--border);
    margin-top: 20px;
    overflow: hidden;
  }

  .loading-bar {
    height: 100%;
    background: var(--accent);
    animation: loadBar 1.5s ease-in-out forwards;
  }

  @keyframes loadBar { from { width: 0; } to { width: 100%; } }

  .loading-text {
    margin-top: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    color: var(--text-dim);
    animation: blink 1s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0.3; } }

  /* SCROLLBAR */
  .right-panel::-webkit-scrollbar { width: 3px; }
  .right-panel::-webkit-scrollbar-track { background: var(--panel); }
  .right-panel::-webkit-scrollbar-thumb { background: var(--border); }

  /* 3MF Badge */
  .format-badge {
    display: inline-block;
    background: rgba(255,255,255,0.05);
    border: 1px solid #333;
    color: var(--text-dim);
    font-size: 7px;
    letter-spacing: 1px;
    padding: 2px 5px;
    border-radius: 2px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 16px;
  }

  /* Responsive hint */
  @media (max-width: 900px) {
    .left-panel { width: 200px; }
    .right-panel { width: 200px; }
  }
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">ROBOFORGE</div>
  <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--text-dim);">3D ROBOT CUSTOMIZER</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <div class="loading-text">INITIALIZING ENGINE...</div>
</div>

<!-- Header -->
<header>
  <div class="logo">ROBO<span>FORGE</span></div>
  <div class="header-info">3D ROBOT CUSTOMIZER</div>
  <div class="header-actions">
    <button class="btn btn-secondary" onclick="randomize()" style="padding:6px 14px;font-size:9px;">RANDOMIZE</button>
    <button class="btn btn-secondary" onclick="resetCamera()" style="padding:6px 14px;font-size:9px;">RESET VIEW</button>
  </div>
</header>

<div class="app-body">

  <!-- LEFT PANEL: Part Selector -->
  <div class="left-panel">
    <div class="panel-title">SELECT PARTS</div>
    <div class="part-categories" id="catTabs"></div>
    <div class="parts-grid" id="partsGrid"></div>
  </div>

  <!-- CENTER: 3D Viewport -->
  <div class="viewport">
    <div class="scan-lines"></div>
    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="corner-deco bl"></div>
    <div class="corner-deco br"></div>
    <div class="robot-name-display">
      <h2 id="robotNameDisplay">UNIT-001</h2>
    </div>
    <canvas id="robot-canvas"></canvas>
    <div class="viewport-overlay">
      <div class="view-hint">DRAG TO ROTATE</div>
      <div class="view-hint">SCROLL TO ZOOM</div>
      <div class="view-hint">RIGHT-DRAG TO PAN</div>
    </div>
  </div>

  <!-- RIGHT PANEL: Colors & Export -->
  <div class="right-panel">
    <div class="name-section">
      <div class="section-label">Robot Name</div>
      <input type="text" class="name-input" id="robotName" value="UNIT-001" maxlength="12"
        oninput="updateRobotName(this.value)">
    </div>

    <div class="color-section">
      <div class="section-label">Color Zones</div>
      <div class="color-zones" id="colorZones"></div>
    </div>

    <div class="stats-section">
      <div class="section-label">Build Info</div>
      <div class="stat-row">
        <span class="stat-label">PARTS SELECTED</span>
        <span class="stat-value" id="stat-parts">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">EST. HEIGHT</span>
        <span class="stat-value" id="stat-height">— mm</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">COMPLEXITY</span>
        <span class="stat-value" id="stat-complexity">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">PRINT TIME EST.</span>
        <span class="stat-value" id="stat-time">— hrs</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">BUILD ID</span>
        <span class="stat-value" id="stat-id" style="font-size:9px">GEN-XXXX</span>
      </div>
    </div>

    <div class="export-section">
      <div class="section-label" style="margin-bottom:0">Export Model</div>
      <button class="btn btn-primary" onclick="exportSTL()">EXPORT STL</button>
      <button class="btn btn-accent2" onclick="export3MF()">EXPORT 3MF <span class="format-badge">COLORS</span></button>
      <button class="btn btn-secondary" onclick="shareConfig()">SHARE BUILD</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ============================================================
//  ROBOT PARTS DATABASE
//  Each part is built procedurally with Three.js geometry.
//  Replace these with your actual 3D model loaders (GLB/GLTF).
// ============================================================

const PARTS_DB = {
  head: {
    label: "HEAD",
    parts: [
      { id: "head_cube",    name: "CUBE",    icon: "01", build: buildHeadCube,    height: 60 },
      { id: "head_dome",    name: "DOME",    icon: "02", build: buildHeadDome,    height: 65 },
      { id: "head_visor",   name: "VISOR",   icon: "03", build: buildHeadVisor,   height: 58 },
      { id: "head_skull",   name: "SKULL",   icon: "04", build: buildHeadSkull,   height: 70 },
    ]
  },
  torso: {
    label: "TORSO",
    parts: [
      { id: "torso_box",    name: "ARMOR",   icon: "01", build: buildTorsoBox,    height: 80 },
      { id: "torso_slim",   name: "SLIM",    icon: "02", build: buildTorsoSlim,   height: 75 },
      { id: "torso_bulky",  name: "BULKY",   icon: "03", build: buildTorsoBulky,  height: 90 },
      { id: "torso_mech",   name: "MECH",    icon: "04", build: buildTorsoMech,   height: 85 },
    ]
  },
  arms: {
    label: "ARMS",
    parts: [
      { id: "arms_basic",   name: "BASIC",   icon: "01", build: buildArmsBasic,   height: 70 },
      { id: "arms_cannon",  name: "CANNON",  icon: "02", build: buildArmsCannon,  height: 75 },
      { id: "arms_claw",    name: "CLAW",    icon: "03", build: buildArmsClaw,    height: 72 },
      { id: "arms_blade",   name: "BLADE",   icon: "04", build: buildArmsBlade,   height: 74 },
    ]
  },
  legs: {
    label: "LEGS",
    parts: [
      { id: "legs_biped",   name: "BIPED",   icon: "01", build: buildLegsBiped,   height: 80 },
      { id: "legs_tank",    name: "TANK",    icon: "02", build: buildLegsTank,    height: 40 },
      { id: "legs_spider",  name: "SPIDER",  icon: "03", build: buildLegsSpider,  height: 50 },
      { id: "legs_hover",   name: "HOVER",   icon: "04", build: buildLegsHover,   height: 35 },
    ]
  },
  accessory: {
    label: "EXTRAS",
    parts: [
      { id: "acc_none",     name: "NONE",    icon: "—",  build: buildAccNone,     height: 0 },
      { id: "acc_antenna",  name: "ANTENNA", icon: "01", build: buildAccAntenna,  height: 30 },
      { id: "acc_jetpack",  name: "JETPACK", icon: "02", build: buildAccJetpack,  height: 40 },
      { id: "acc_wings",    name: "WINGS",   icon: "03", build: buildAccWings,    height: 20 },
    ]
  }
};

const COLOR_ZONES = [
  { id: "primary",   label: "Primary",   default: "#d4d4d4" },
  { id: "secondary", label: "Secondary", default: "#2a2a2a" },
  { id: "accent",    label: "Accent",    default: "#e8ff47" },
  { id: "dark",      label: "Dark",      default: "#111111" },
];

const COLOR_PRESETS = [
  "#d4d4d4","#e8ff47","#ff6b35","#3b82f6","#10b981",
  "#f59e0b","#ef4444","#a855f7","#ffffff","#111111"
];

// ============================================================
//  STATE
// ============================================================
let selectedParts = {};
let colors = {};
let robotName = "UNIT-001";
let scene, camera, renderer, robotGroup, animFrame;
let isDragging = false, isRightDrag = false;
let prevMouse = { x: 0, y: 0 };
let camTheta = 0.4, camPhi = Math.PI / 4, camDist = 5.5;
let panOffset = { x: 0, y: 0 };

// ============================================================
//  THREE.JS SETUP
// ============================================================
function initThree() {
  const canvas = document.getElementById('robot-canvas');
  const container = canvas.parentElement;

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  // ACESFilmic tone mapping adds contrast and depth — best AO-like look available in Three.js r128
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  resize();

  scene = new THREE.Scene();
  // Blender viewport grey — #727272 in sRGB
  scene.background = new THREE.Color(0x727272);

  // Soft environment fog adds depth separation (AO-like distance darkening)
  scene.fog = new THREE.Fog(0x727272, 8, 22);

  camera = new THREE.PerspectiveCamera(45, canvas.offsetWidth / canvas.offsetHeight, 0.1, 100);
  updateCamera();

  // Lights — balanced for light grey background
  // Hemisphere light simulates sky/ground GI — closest to real AO in Three.js r128
  const hemi = new THREE.HemisphereLight(0xffffff, 0x888888, 0.9);
  hemi.position.set(0, 10, 0);
  scene.add(hemi);

  // Key light — main directional, casts shadows (shadow edges = AO feel)
  const key = new THREE.DirectionalLight(0xffffff, 0.85);
  key.position.set(4, 7, 5);
  key.castShadow = true;
  key.shadow.mapSize.width = 2048;
  key.shadow.mapSize.height = 2048;
  key.shadow.camera.near = 0.5;
  key.shadow.camera.far = 20;
  key.shadow.camera.left = -4;
  key.shadow.camera.right = 4;
  key.shadow.camera.top = 6;
  key.shadow.camera.bottom = -4;
  key.shadow.bias = -0.001;
  // Soft shadow radius = softer penumbra = more AO-like
  key.shadow.radius = 3;
  scene.add(key);

  // Fill — opposite side, soft
  const fill = new THREE.DirectionalLight(0xffffff, 0.2);
  fill.position.set(-4, 3, -2);
  scene.add(fill);

  // Rim — subtle back light for silhouette separation from bg
  const rim = new THREE.DirectionalLight(0xffffff, 0.12);
  rim.position.set(0, 2, -6);
  scene.add(rim);

  // Shadow-receiving ground plane (invisible, only catches shadows — key AO trick)
  const groundGeo = new THREE.PlaneGeometry(12, 12);
  const groundMat = new THREE.ShadowMaterial({ opacity: 0.18 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -2.5;
  ground.receiveShadow = true;
  scene.add(ground);

  // Grid floor — light grey on grey bg
  const grid = new THREE.GridHelper(10, 20, 0x686868, 0x686868);
  grid.position.y = -2.49;
  grid.material.opacity = 0.4;
  grid.material.transparent = true;
  scene.add(grid);

  // Robot group
  robotGroup = new THREE.Group();
  scene.add(robotGroup);

  // Events
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', () => isDragging = false);
  canvas.addEventListener('wheel', onWheel, { passive: true });
  canvas.addEventListener('contextmenu', e => e.preventDefault());
  window.addEventListener('resize', resize);

  // Touch
  canvas.addEventListener('touchstart', onTouchStart, { passive: true });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });

  animate();
}

function resize() {
  const canvas = document.getElementById('robot-canvas');
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  renderer.setSize(w, h, false);
  if (camera) {
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
}

function updateCamera() {
  const x = camDist * Math.sin(camPhi) * Math.sin(camTheta);
  const y = camDist * Math.cos(camPhi);
  const z = camDist * Math.sin(camPhi) * Math.cos(camTheta);
  camera.position.set(x + panOffset.x, y + panOffset.y, z);
  camera.lookAt(panOffset.x, panOffset.y, 0);
}

function resetCamera() {
  camTheta = 0.4; camPhi = Math.PI / 4; camDist = 5.5;
  panOffset = { x: 0, y: 0 };
  updateCamera();
}

function animate() {
  animFrame = requestAnimationFrame(animate);
  // Gentle auto-rotate when idle (optional)
  robotGroup.rotation.y += 0.002;
  renderer.render(scene, camera);
}

// Mouse controls
function onMouseDown(e) {
  isDragging = true;
  isRightDrag = e.button === 2;
  prevMouse = { x: e.clientX, y: e.clientY };
  robotGroup.rotation.y; // pause auto-rotate on interact
}

function onMouseMove(e) {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  prevMouse = { x: e.clientX, y: e.clientY };

  if (isRightDrag) {
    panOffset.x -= dx * 0.005;
    panOffset.y += dy * 0.005;
  } else {
    camTheta -= dx * 0.01;
    camPhi = Math.max(0.1, Math.min(Math.PI - 0.1, camPhi + dy * 0.01));
    robotGroup.rotation.y = 0; // stop auto-rotate while dragging
  }
  updateCamera();
}

function onWheel(e) {
  camDist = Math.max(2, Math.min(12, camDist + e.deltaY * 0.01));
  updateCamera();
}

let touchStart = null;
function onTouchStart(e) {
  if (e.touches.length === 1) touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}
function onTouchMove(e) {
  if (!touchStart || e.touches.length !== 1) return;
  e.preventDefault();
  const dx = e.touches[0].clientX - touchStart.x;
  const dy = e.touches[0].clientY - touchStart.y;
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  camTheta -= dx * 0.01;
  camPhi = Math.max(0.1, Math.min(Math.PI - 0.1, camPhi + dy * 0.01));
  updateCamera();
}

// ============================================================
//  MATERIAL HELPER — standard white-lit with AO feel
// ============================================================
function makeMat(colorKey, opts = {}) {
  const hex = colors[colorKey] || "#d4d4d4";
  const col = new THREE.Color(hex);
  return new THREE.MeshStandardMaterial({
    color: col,
    metalness: 0.15,
    roughness: 0.65,
    ...opts
  });
}

function box(w, h, d, colorKey, opts) {
  const g = new THREE.BoxGeometry(w, h, d);
  const m = new THREE.Mesh(g, makeMat(colorKey, opts));
  m.castShadow = true; m.receiveShadow = true;
  return m;
}

function cyl(rt, rb, h, segs, colorKey, opts) {
  const g = new THREE.CylinderGeometry(rt, rb, h, segs);
  const m = new THREE.Mesh(g, makeMat(colorKey, opts));
  m.castShadow = true; m.receiveShadow = true;
  return m;
}

function sph(r, segs, colorKey, opts) {
  const g = new THREE.SphereGeometry(r, segs, segs);
  const m = new THREE.Mesh(g, makeMat(colorKey, opts));
  m.castShadow = true; m.receiveShadow = true;
  return m;
}

function addTo(parent, mesh, x, y, z) {
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  parent.add(mesh);
  return mesh;
}

    leg.add(seg2);

    const tip = sph(0.05, 6, "accent");
    tip.position.set(0.14, -0.62, 0);
    leg.add(tip);

    leg.rotation.y = angle;
    leg.position.set(Math.sin(angle) * 0.22, -0.2, Math.cos(angle) * 0.22);
    grp.add(leg);
  }

  return grp;
}

function buildLegsHover(g) {
  const grp = new THREE.Group();
  // hover pad
  const pad = cyl(0.55, 0.45, 0.12, 16, "secondary");
  pad.position.y = -0.06;
  grp.add(pad);

  const ring = cyl(0.52, 0.52, 0.04, 16, "accent");
  ring.position.y = 0.0;
  grp.add(ring);

  // thrusters
  [0, Math.PI/2, Math.PI, Math.PI*1.5].forEach(a => {
    const thruster = cyl(0.08, 0.12, 0.18, 8, "primary");
    thruster.position.set(Math.sin(a) * 0.38, -0.15, Math.cos(a) * 0.38);
    grp.add(thruster);

    const glow = new THREE.PointLight(new THREE.Color(colors.accent), 0.3, 0.5);
    glow.position.set(Math.sin(a) * 0.38, -0.28, Math.cos(a) * 0.38);
    grp.add(glow);
  });

  return grp;
}

// ============================================================
//  ACCESSORIES
// ============================================================
function buildAccNone(g) { return new THREE.Group(); }

function buildAccAntenna(g) {
  const grp = new THREE.Group();
  const base = cyl(0.04, 0.04, 0.35, 6, "secondary");
  base.position.y = 0.17;
  grp.add(base);
  const dish = cyl(0.12, 0.04, 0.08, 8, "primary");
  dish.position.y = 0.37;
  grp.add(dish);
  const tip = sph(0.05, 6, "accent");
  tip.position.y = 0.44;
  grp.add(tip);
  const gl = new THREE.PointLight(new THREE.Color(colors.accent), 0.4, 0.6);
  gl.position.y = 0.5;
  grp.add(gl);
  return grp;
}

function buildAccJetpack(g) {
  const grp = new THREE.Group();
  const pack = box(0.55, 0.5, 0.22, "secondary");
  pack.position.z = -0.42;
  grp.add(pack);
  [-0.16, 0.16].forEach(x => {
    const nozzle = cyl(0.08, 0.12, 0.2, 8, "primary");
    nozzle.position.set(x, -0.3, -0.42);
    grp.add(nozzle);
    const flame = new THREE.PointLight(new THREE.Color(colors.accent2 || "#ff6b35"), 0.5, 0.7);
    flame.position.set(x, -0.48, -0.42);
    grp.add(flame);
  });
  const stripe = box(0.55, 0.05, 0.24, "accent");
  stripe.position.set(0, 0.1, -0.42);
  grp.add(stripe);
  return grp;
}

function buildAccWings(g) {
  const grp = new THREE.Group();
  [-1, 1].forEach(side => {
    const wingGeo = new THREE.BoxGeometry(0.6, 0.04, 0.35);
    const wing = new THREE.Mesh(wingGeo, makeMat("primary"));
    wing.position.set(side * 0.55, 0.1, -0.2);
    wing.rotation.y = side * 0.4;
    wing.rotation.z = side * 0.15;
    grp.add(wing);

    const tip = box(0.08, 0.04, 0.1, "accent");
    tip.position.set(side * 0.88, 0.1, -0.26);
    grp.add(tip);
  });
  return grp;
}

// ============================================================
//  BUILD ROBOT
// ============================================================
const PART_OFFSETS = {
  head:      { y: 1.6 },
  accessory: { y: 2.05 },
  torso:     { y: 0.5 },
  arms:      { y: 0.5 },
  legs:      { y: -0.55 },
};

function buildRobot() {
  // Clear
  while (robotGroup.children.length) robotGroup.remove(robotGroup.children[0]);

  const categories = Object.keys(PARTS_DB);
  categories.forEach(cat => {
    const selId = selectedParts[cat];
    if (!selId) return;
    const partDef = PARTS_DB[cat].parts.find(p => p.id === selId);
    if (!partDef) return;

    const mesh = partDef.build();
    const offset = PART_OFFSETS[cat] || { y: 0 };
    mesh.position.y = offset.y;
    robotGroup.add(mesh);
  });

  updateStats();
}

function rebuildMaterials() {
  // Traverse and rebuild materials by replacing them
  buildRobot();
}

// ============================================================
//  UI
// ============================================================
function buildUI() {
  buildCategoryTabs();
  buildColorZones();
}

let currentCat = "head";

function buildCategoryTabs() {
  const tabs = document.getElementById('catTabs');
  tabs.innerHTML = '';
  Object.entries(PARTS_DB).forEach(([catId, catData]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (catId === currentCat ? ' active' : '');
    btn.textContent = catData.label;
    btn.onclick = () => switchCategory(catId);
    tabs.appendChild(btn);
  });
  buildPartsGrid(currentCat);
}

function switchCategory(catId) {
  currentCat = catId;
  document.querySelectorAll('.cat-btn').forEach((b, i) => {
    b.classList.toggle('active', Object.keys(PARTS_DB)[i] === catId);
  });
  buildPartsGrid(catId);
}

function buildPartsGrid(catId) {
  const grid = document.getElementById('partsGrid');
  grid.innerHTML = '';
  const cat = PARTS_DB[catId];
  cat.parts.forEach(part => {
    const card = document.createElement('div');
    card.className = 'part-card' + (selectedParts[catId] === part.id ? ' selected' : '');
    card.innerHTML = `
      <div class="selected-badge"></div>
      <div class="part-preview"><span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--text-dim);letter-spacing:1px;">${part.icon}</span></div>
      <div class="part-name">${part.name}</div>
    `;
    card.onclick = () => selectPart(catId, part.id);
    grid.appendChild(card);
  });
}

function selectPart(catId, partId) {
  selectedParts[catId] = partId;
  buildPartsGrid(catId);
  buildRobot();
}

function buildColorZones() {
  const wrap = document.getElementById('colorZones');
  wrap.innerHTML = '';
  COLOR_ZONES.forEach(zone => {
    const row = document.createElement('div');
    row.className = 'color-zone';
    row.innerHTML = `
      <div class="zone-label">${zone.label}</div>
      <div class="color-picker-wrap">
        <div class="color-swatch" style="background:${colors[zone.id]}">
          <input type="color" value="${colors[zone.id]}" 
            oninput="setColor('${zone.id}', this.value, this.parentElement)"
            onchange="setColor('${zone.id}', this.value, this.parentElement)">
        </div>
        <div class="color-presets">
          ${COLOR_PRESETS.slice(0,5).map(c => `
            <div class="preset-dot" style="background:${c}" 
              onclick="setColor('${zone.id}', '${c}', this.closest('.color-zone').querySelector('.color-swatch'))"></div>
          `).join('')}
        </div>
      </div>
    `;
    wrap.appendChild(row);
  });
}

function setColor(zoneId, value, swatchEl) {
  colors[zoneId] = value;
  if (swatchEl) swatchEl.style.background = value;
  rebuildMaterials();
}

function updateRobotName(val) {
  robotName = val.toUpperCase();
  document.getElementById('robotNameDisplay').textContent = robotName || 'UNIT';
}

function updateStats() {
  const partCount = Object.values(selectedParts).filter(Boolean).length;
  document.getElementById('stat-parts').textContent = partCount;

  let totalH = 0;
  Object.entries(selectedParts).forEach(([cat, id]) => {
    const part = PARTS_DB[cat]?.parts.find(p => p.id === id);
    if (part) totalH += part.height;
  });
  document.getElementById('stat-height').textContent = totalH + ' mm';

  const complexity = totalH > 350 ? 'HIGH' : totalH > 250 ? 'MEDIUM' : 'LOW';
  document.getElementById('stat-complexity').textContent = complexity;
  document.getElementById('stat-time').textContent = (totalH / 60).toFixed(1);

  const buildId = 'R-' + Math.random().toString(36).substr(2, 6).toUpperCase();
  document.getElementById('stat-id').textContent = buildId;
}

function randomize() {
  Object.keys(PARTS_DB).forEach(cat => {
    const parts = PARTS_DB[cat].parts;
    selectedParts[cat] = parts[Math.floor(Math.random() * parts.length)].id;
  });
  COLOR_ZONES.forEach(zone => {
    colors[zone.id] = COLOR_PRESETS[Math.floor(Math.random() * COLOR_PRESETS.length)];
  });
  buildColorZones();
  buildPartsGrid(currentCat);
  buildRobot();
  showToast('RANDOMIZED');
}

// ============================================================
//  EXPORT — STL
// ============================================================
function exportSTL() {
  showToast('GENERATING STL...');

  setTimeout(() => {
    try {
      const stlData = generateSTL();
      downloadBlob(stlData, robotName + '.stl', 'model/stl');
      showToast('STL EXPORTED');
    } catch(e) {
      console.error(e);
      showToast('EXPORT ERROR');
    }
  }, 100);
}

function generateSTL() {
  // Collect all geometry from robotGroup
  const triangles = [];

  robotGroup.traverse(obj => {
    if (!obj.isMesh) return;
    const geo = obj.geometry.clone();
    geo.applyMatrix4(obj.matrixWorld);

    const pos = geo.attributes.position;
    const index = geo.index;

    if (index) {
      for (let i = 0; i < index.count; i += 3) {
        const a = index.getX(i), b = index.getX(i+1), c = index.getX(i+2);
        triangles.push([
          [pos.getX(a), pos.getY(a), pos.getZ(a)],
          [pos.getX(b), pos.getY(b), pos.getZ(b)],
          [pos.getX(c), pos.getY(c), pos.getZ(c)],
        ]);
      }
    } else {
      for (let i = 0; i < pos.count; i += 3) {
        triangles.push([
          [pos.getX(i), pos.getY(i), pos.getZ(i)],
          [pos.getX(i+1), pos.getY(i+1), pos.getZ(i+1)],
          [pos.getX(i+2), pos.getY(i+2), pos.getZ(i+2)],
        ]);
      }
    }
  });

  // Scale to mm (Three.js units * 100 = ~100mm per unit)
  const scale = 100;

  // Binary STL
  const buf = new ArrayBuffer(84 + triangles.length * 50);
  const view = new DataView(buf);

  // Header (80 bytes)
  const header = `RoboForge STL - ${robotName} - Generated by RoboForge`;
  for (let i = 0; i < 80; i++) {
    view.setUint8(i, i < header.length ? header.charCodeAt(i) : 0);
  }

  view.setUint32(80, triangles.length, true);

  triangles.forEach((tri, idx) => {
    const off = 84 + idx * 50;
    // Normal (compute cross product)
    const [A, B, C] = tri;
    const u = [B[0]-A[0], B[1]-A[1], B[2]-A[2]];
    const v = [C[0]-A[0], C[1]-A[1], C[2]-A[2]];
    const n = [u[1]*v[2]-u[2]*v[1], u[2]*v[0]-u[0]*v[2], u[0]*v[1]-u[1]*v[0]];
    const nl = Math.sqrt(n[0]**2+n[1]**2+n[2]**2) || 1;
    view.setFloat32(off,    n[0]/nl, true);
    view.setFloat32(off+4,  n[1]/nl, true);
    view.setFloat32(off+8,  n[2]/nl, true);
    // Vertices
    tri.forEach((v, vi) => {
      view.setFloat32(off + 12 + vi*12,     v[0]*scale, true);
      view.setFloat32(off + 12 + vi*12 + 4, v[1]*scale, true);
      view.setFloat32(off + 12 + vi*12 + 8, v[2]*scale, true);
    });
    view.setUint16(off + 48, 0, true);
  });

  return buf;
}

// ============================================================
//  EXPORT — 3MF with colors
// ============================================================
function export3MF() {
  showToast('GENERATING 3MF...');
  setTimeout(() => {
    try {
      const zip = generate3MF();
      downloadBlob(zip, robotName + '.3mf', 'application/vnd.ms-package.3dmanufacturing-3dmodel+xml');
      showToast('3MF EXPORTED');
    } catch(e) {
      console.error(e);
      showToast('EXPORT ERROR');
    }
  }, 100);
}

function generate3MF() {
  // 3MF is a ZIP containing XML. We'll generate a minimal valid 3MF.
  // Collect meshes with their colors
  const objects = [];
  let objId = 1;

  robotGroup.traverse(obj => {
    if (!obj.isMesh) return;
    const geo = obj.geometry.clone();
    geo.applyMatrix4(obj.matrixWorld);

    const pos = geo.attributes.position;
    const index = geo.index;
    const vertices = [];
    const trianglesList = [];
    const scale = 100;

    // Deduplicate vertices
    const vMap = new Map();
    const getV = (x, y, z) => {
      const key = `${x.toFixed(5)},${y.toFixed(5)},${z.toFixed(5)}`;
      if (!vMap.has(key)) {
        vMap.set(key, vertices.length);
        vertices.push([x * scale, y * scale, z * scale]);
      }
      return vMap.get(key);
    };

    if (index) {
      for (let i = 0; i < index.count; i += 3) {
        const a = index.getX(i), b = index.getX(i+1), c = index.getX(i+2);
        trianglesList.push([
          getV(pos.getX(a), pos.getY(a), pos.getZ(a)),
          getV(pos.getX(b), pos.getY(b), pos.getZ(b)),
          getV(pos.getX(c), pos.getY(c), pos.getZ(c)),
        ]);
      }
    } else {
      for (let i = 0; i < pos.count; i += 3) {
        trianglesList.push([
          getV(pos.getX(i), pos.getY(i), pos.getZ(i)),
          getV(pos.getX(i+1), pos.getY(i+1), pos.getZ(i+1)),
          getV(pos.getX(i+2), pos.getY(i+2), pos.getZ(i+2)),
        ]);
      }
    }

    // Get color from material
    let color = '#888888';
    if (obj.material && obj.material.color) {
      const c = obj.material.color;
      color = '#' + [c.r, c.g, c.b].map(v =>
        Math.round(v * 255).toString(16).padStart(2, '0')).join('');
    }

    objects.push({ id: objId++, vertices, triangles: trianglesList, color });
  });

  // Build 3MF XML
  const verticesXML = (obj) =>
    obj.vertices.map(v => `        <vertex x="${v[0].toFixed(4)}" y="${v[1].toFixed(4)}" z="${v[2].toFixed(4)}"/>`).join('\n');

  const trianglesXML = (obj) =>
    obj.triangles.map(t => `        <triangle v1="${t[0]}" v2="${t[1]}" v3="${t[2]}"/>`).join('\n');

  const objectsXML = objects.map(obj => `
    <object id="${obj.id}" type="model" p:UUID="${randomUUID()}">
      <mesh>
        <vertices>
${verticesXML(obj)}
        </vertices>
        <triangles>
${trianglesXML(obj)}
        </triangles>
      </mesh>
    </object>`).join('\n');

  const buildItems = objects.map(obj =>
    `    <item objectid="${obj.id}" p:UUID="${randomUUID()}" printable="1"/>`
  ).join('\n');

  const model3MF = `<?xml version="1.0" encoding="UTF-8"?>
<model unit="millimeter" xml:lang="en-US"
  xmlns="http://schemas.microsoft.com/3dmanufacturing/core/2015/02"
  xmlns:p="http://schemas.microsoft.com/3dmanufacturing/production/2015/06">
  <metadata name="Designer">RoboForge</metadata>
  <metadata name="Description">${robotName} - Custom Robot</metadata>
  <metadata name="Application">RoboForge Robot Customizer</metadata>
  <resources>
${objectsXML}
  </resources>
  <build>
${buildItems}
  </build>
</model>`;

  // Color sidecar (Bambu/PrusaSlicer style) — simple XML
  const colorXML = `<?xml version="1.0" encoding="UTF-8"?>
<config>
  <object id="1">
${objects.map((obj, i) => `    <part id="${i+1}" subtype="normal_part">
      <metadata key="color_hex" value="${obj.color.replace('#','')}"/>
      <metadata key="name" value="Part_${i+1}"/>
    </part>`).join('\n')}
  </object>
</config>`;

  // Pack into a minimal ZIP
  const zipBytes = buildMinimalZip([
    { path: '3D/3dmodel.model', content: model3MF },
    { path: 'Metadata/model_settings.config', content: colorXML },
    { path: '[Content_Types].xml', content: `<?xml version="1.0" encoding="UTF-8"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="model" ContentType="application/vnd.ms-package.3dmanufacturing-3dmodel+xml"/>
  <Default Extension="config" ContentType="application/xml"/>
</Types>` },
    { path: '_rels/.rels', content: `<?xml version="1.0" encoding="UTF-8"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Target="/3D/3dmodel.model" Id="rel-1" Type="http://schemas.microsoft.com/3dmanufacturing/2013/01/3dmodel"/>
</Relationships>` },
  ]);

  return zipBytes;
}

function randomUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

// Minimal ZIP builder (no compression, stored)
function buildMinimalZip(files) {
  const encoder = new TextEncoder();
  const entries = [];
  let offset = 0;

  files.forEach(file => {
    const pathBytes = encoder.encode(file.path);
    const dataBytes = encoder.encode(file.content);
    const crc = crc32(dataBytes);

    // Local file header
    const local = new Uint8Array(30 + pathBytes.length + dataBytes.length);
    const lv = new DataView(local.buffer);
    lv.setUint32(0, 0x04034b50, true); // sig
    lv.setUint16(4, 20, true);  // version needed
    lv.setUint16(6, 0, true);   // flags
    lv.setUint16(8, 0, true);   // compression: stored
    lv.setUint16(10, 0, true);  // mod time
    lv.setUint16(12, 0, true);  // mod date
    lv.setUint32(14, crc, true);
    lv.setUint32(18, dataBytes.length, true);
    lv.setUint32(22, dataBytes.length, true);
    lv.setUint16(26, pathBytes.length, true);
    lv.setUint16(28, 0, true);
    local.set(pathBytes, 30);
    local.set(dataBytes, 30 + pathBytes.length);

    entries.push({ local, pathBytes, dataBytes, crc, offset });
    offset += local.length;
  });

  // Central directory
  const cdEntries = entries.map(e => {
    const cd = new Uint8Array(46 + e.pathBytes.length);
    const cv = new DataView(cd.buffer);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint16(8, 0, true);
    cv.setUint16(10, 0, true);
    cv.setUint16(12, 0, true);
    cv.setUint16(14, 0, true);
    cv.setUint32(16, e.crc, true);
    cv.setUint32(20, e.dataBytes.length, true);
    cv.setUint32(24, e.dataBytes.length, true);
    cv.setUint16(28, e.pathBytes.length, true);
    cv.setUint16(30, 0, true);
    cv.setUint16(32, 0, true);
    cv.setUint16(34, 0, true);
    cv.setUint16(36, 0, true);
    cv.setUint32(38, 0, true);
    cv.setUint32(42, e.offset, true);
    cd.set(e.pathBytes, 46);
    return cd;
  });

  const cdSize = cdEntries.reduce((s, c) => s + c.length, 0);
  const cdOffset = offset;

  const eocd = new Uint8Array(22);
  const ev = new DataView(eocd.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(4, 0, true);
  ev.setUint16(6, 0, true);
  ev.setUint16(8, entries.length, true);
  ev.setUint16(10, entries.length, true);
  ev.setUint32(12, cdSize, true);
  ev.setUint32(16, cdOffset, true);
  ev.setUint16(20, 0, true);

  const parts = [...entries.map(e => e.local), ...cdEntries, eocd];
  const total = parts.reduce((s, p) => s + p.length, 0);
  const result = new Uint8Array(total);
  let pos = 0;
  parts.forEach(p => { result.set(p, pos); pos += p.length; });
  return result.buffer;
}

function crc32(bytes) {
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i++) {
    crc ^= bytes[i];
    for (let j = 0; j < 8; j++) crc = (crc >>> 1) ^ (crc & 1 ? 0xEDB88320 : 0);
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

function downloadBlob(data, filename, mime) {
  const blob = new Blob([data], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============================================================
//  SHARE
// ============================================================
function shareConfig() {
  const config = {
    name: robotName,
    parts: selectedParts,
    colors
  };
  const encoded = btoa(JSON.stringify(config));
  const url = window.location.href.split('?')[0] + '?build=' + encoded;
  navigator.clipboard?.writeText(url).then(() => showToast('LINK COPIED'));

  // Also try to load from URL on startup
}

// Load from URL on startup
(function loadFromURL() {
  const params = new URLSearchParams(window.location.search);
  const build = params.get('build');
  if (!build) return;
  try {
    const config = JSON.parse(atob(build));
    if (config.parts) selectedParts = config.parts;
    if (config.colors) Object.assign(colors, config.colors);
    if (config.name) robotName = config.name;
    document.getElementById('robotName').value = robotName;
    document.getElementById('robotNameDisplay').textContent = robotName;
  } catch(e) {}
})();

// ============================================================
//  TOAST
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
